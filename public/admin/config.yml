backend:
  name: github
  repo: FloridaClarinetStudio/florida-clarinet-studio
  branch: main

local_backend: true
publish_mode: editorial_workflow
site_url: https://floridaclarinetstudio.com
display_url: https://floridaclarinetstudio.com
logo:
  src: /images/florida-clarinet-studio-logo.png
  show_in_header: true
media_folder: public/images/uploads
public_folder: /images/uploads
slug:
  encoding: ascii
  clean_accents: true
  sanitize_replacement: "-"

collections:
  - name: blog
    label: Blog
    label_singular: Blog Post
    description: Articles from Robin Ryon about music study, practice, auditions, and student growth.
    folder: src/content/blog
    create: true
    delete: true
    extension: md
    format: frontmatter
    slug: "{{slug}}"
    preview_path: "blog/{{slug}}"
    summary: "{{title}} - {{pubDate}}"
    sortable_fields: [pubDate, title]
    view_groups:
      - label: Drafts
        field: draft
    fields:
      - label: Title
        name: title
        widget: string
      - label: Description
        name: description
        widget: text
        required: false
        hint: Short summary used on the blog index and in search/social metadata.
      - label: Publish Date
        name: pubDate
        widget: date
        format: YYYY-MM-DD
        default: "{{now}}"
      - label: Updated Date
        name: updatedDate
        widget: date
        format: YYYY-MM-DD
        required: false
      - label: Categories
        name: categories
        widget: list
        required: false
        default: []
        field:
          label: Category
          name: category
          widget: string
      - label: Tags
        name: tags
        widget: list
        required: false
        default: []
        field:
          label: Tag
          name: tag
          widget: string
      - label: Draft
        name: draft
        widget: boolean
        default: true
      - label: Body
        name: body
        widget: markdown
